<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Todos los Juegos</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
padding:20px;
}

.contenedor{
text-align:center;
background:white;
padding:30px;
border-radius:25px;
box-shadow:0 10px 30px rgba(0,0,0,.3);
max-width:1000px;
width:100%;
}

h1{
color:#2196f3;
margin-bottom:10px;
font-size:40px;
}

p{
font-size:20px;
margin-bottom:30px;
color:#555;
}

.juegos{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:25px;
}

.juego{
width:150px;
height:150px;
border-radius:50%;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
cursor:pointer;
font-size:22px;
font-weight:bold;
color:white;
text-decoration:none;
transition:.3s;
box-shadow:0 5px 15px rgba(0,0,0,.3);
}

.juego:hover{
transform:scale(1.1);
}

.j1{background:#ff9800;}
.j2{background:#4caf50;}
.j3{background:#e91e63;}
.j4{background:#3f51b5;}
.j5{background:#9c27b0;}
.j6{background:#f44336;}

.numero{
font-size:45px;
}

.nombre{
font-size:16px;
padding:0 10px;
text-align:center;
}

</style>
</head>
<body>

<div class="contenedor">

<h1>🎮 Centro de Juegos Matemáticos</h1>

<p>Selecciona el juego que deseas jugar</p>

<div class="juegos">

<a href="juego1.html" class="juego j1">
<div class="numero">1</div>
<div class="nombre">Carrera Espacial</div>
</a>

<a href="juego2.html" class="juego j2">
<div class="numero">2</div>
<div class="nombre">Cohete Matemático</div>
</a>

<a href="juego3.html" class="juego j3">
<div class="numero">3</div>
<div class="nombre">Memoria Numérica</div>
</a>

<a href="juego4.html" class="juego j4">
<div class="numero">4</div>
<div class="nombre">Atrapa el Número</div>
</a>

<a href="juego5.html" class="juego j5">
<div class="numero">5</div>
<div class="nombre">Quiz de Restas</div>
</a>

<a href="juego6.html" class="juego j6">
<div class="numero">6</div>
<div class="nombre">Desafío Final</div>
</a>
  <a href="todos.html" class="juego todos">
<div class="numero">🏠</div>
<div class="nombre">Todos HTML</div>
</a>

</div>

</div>

</body>
</html>
