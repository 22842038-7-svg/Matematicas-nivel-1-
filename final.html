
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>¡Felicitaciones!</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-image:url("img/fondo.jpg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
height:100vh;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
text-align:center;
}

.contenedor{
background:rgba(255,255,255,.95);
padding:40px;
border-radius:30px;
width:90%;
max-width:700px;
box-shadow:0 0 30px rgba(0,0,0,.4);
animation:aparecer 1s ease;
}

h1{
font-size:50px;
color:#ff9800;
margin-bottom:20px;
}

p{
font-size:28px;
margin-bottom:25px;
}

.estrellas{
font-size:90px;
animation:brillar 1s infinite alternate;
}

button{
margin-top:25px;
padding:15px 30px;
font-size:22px;
border:none;
border-radius:15px;
background:#4caf50;
color:white;
cursor:pointer;
font-weight:bold;
}

button:hover{
transform:scale(1.1);
}

@keyframes brillar{

from{
transform:scale(1);
}

to{
transform:scale(1.2);
}

}

@keyframes aparecer{

from{
opacity:0;
transform:translateY(-50px);
}

to{
opacity:1;
transform:translateY(0);
}

}

</style>
</head>

<body>

<div class="contenedor">

<h1>🏆 ¡FELICITACIONES! 🏆</h1>

<p>
Has completado todos los juegos matemáticos.
</p>

<div class="estrellas">
⭐ ⭐ ⭐
</div>

<p>
Eres un verdadero campeón de las matemáticas.
</p>

<button onclick="volverInicio()">
🏠 Volver al Inicio
</button>

</div>

<audio id="celebracion" autoplay>
<source src="audio/felicitaciones.mp3">
</audio>

<script>

function volverInicio(){

window.location.href="todoslosjuegos.html";

}

function lanzarConfeti(){

confetti({
particleCount:300,
spread:180,
origin:{y:0.6}
});

}

lanzarConfeti();

setInterval(()=>{

confetti({
particleCount:80,
spread:100
});

},2500);

</script>

</body>
</html>
