<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="icon" href="img/icon.png" image/png">
    <link rel="stylesheet" href="css/estilo_login.css">
    
</head>

<body>

    <div class="contenedor">

        <h1>Iniciar sesion</h1>
        <p>Aprende jugando con números</p>

        <img src="img/plataforma.jpg" class="imagen-principal" alt="Matemáticas">

        <div>
            <input type="text" id="nombre" placeholder="Ingresa tu nombre">
        </div>

        <h2>Escoge tu avatar</h2>

        <div class="contenedor-avatares">
            <img src="img/avatar1.jpg" onclick="seleccionar(this)">
            <img src="img/avatar2.jpg" onclick="seleccionar(this)">
            <img src="img/avatar3.png" onclick="seleccionar(this)">
            <img src="img/avatar5.png" onclick="seleccionar(this)">
            <img src="img/avatar6.png" onclick="seleccionar(this)">
            <img src="img/avatar4.jpg" onclick="seleccionar(this)">
        </div>
        <button onclick="ingresar()">Ingresar</button>
    </div>

    <audio id="click" src="sonido/click.mp3"></audio>
    <audio id="error" src="sonido/error.mp3"></audio>
    <audio id="errorNombre" src="sonido/error.mp3"></audio>
    <audio id="errorAvatar" src="sonido/error.mp3"></audio>
    <audio id="bien" src="sonido/bien.mp3"></audio>


    <script src="js/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>

</body>
</html>
