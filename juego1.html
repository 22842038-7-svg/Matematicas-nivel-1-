<script>

const preguntas = [
{a:5,b:3},
{a:7,b:2},
{a:4,b:5},
{a:6,b:3},
{a:8,b:1},
{a:9,b:4},
{a:10,b:5},
{a:12,b:3}
];

let indice = 0;
let correcta = 0;
let posicionCohete = 0;

const zona = document.getElementById("zonaRespuesta");
const mensaje = document.getElementById("mensaje");
const cohete = document.getElementById("cohete");
const puntosHTML = document.getElementById("puntos");

let puntaje =
parseInt(localStorage.getItem("puntaje")) || 0;

puntosHTML.textContent = puntaje;

window.onload = () => {

let nombre =
localStorage.getItem("nombre") || "Estudiante";

let avatar =
localStorage.getItem("avatar") || "img/avatar.png";

document.getElementById("nombreUsuario").textContent = nombre;
document.getElementById("avatarUsuario").src = avatar;

document.querySelectorAll(".respuesta").forEach(item=>{

item.addEventListener("click",()=>{

let audio =
document.getElementById("audioNumero");

audio.currentTime = 0;
audio.play();

});

item.addEventListener("dragstart",dragStart);

});

cargarPregunta();

};

function cargarPregunta(){

if(indice >= preguntas.length){

mensaje.innerHTML =
"🏆 ¡Completaste todas las sumas!";

mensaje.className =
"correcto";

confetti({
particleCount:300,
spread:120
});

document.getElementById(
"audioFelicitacion"
).play();

document.getElementById(
"btnSiguiente"
).disabled = false;

return;
}

let p = preguntas[indice];

correcta = p.a + p.b;

document.querySelector(
".pregunta h2"
).innerHTML =
`${p.a} + ${p.b} = ?`;

let respuestas = [correcta];

while(respuestas.length < 3){

let falsa =
correcta + Math.floor(Math.random()*6)-3;

if(
falsa > 0 &&
!respuestas.includes(falsa)
){
respuestas.push(falsa);
}

}

respuestas.sort(
()=>Math.random()-0.5
);

document.querySelectorAll(
".respuesta"
).forEach((caja,i)=>{

caja.innerHTML =
respuestas[i];

caja.dataset.valor =
respuestas[i];

});

}

function dragStart(e){

e.dataTransfer.setData(
"text",
e.target.dataset.valor
);

}

zona.addEventListener("dragover",e=>{

e.preventDefault();

});

zona.addEventListener("drop",e=>{

e.preventDefault();

let valor =
e.dataTransfer.getData("text");

validar(valor);

});

function validar(valor){

if(parseInt(valor)===correcta){

document.getElementById(
"audioCorrecto"
).play();

mensaje.innerHTML =
"🎉 ¡Correcto!";

mensaje.className =
"correcto";

puntaje += 10;

localStorage.setItem(
"puntaje",
puntaje
);

puntosHTML.textContent =
puntaje;

posicionCohete += 50;

cohete.style.left =
posicionCohete + "px";

confetti({
particleCount:120,
spread:90
});

indice++;

setTimeout(()=>{

mensaje.innerHTML = "";

cargarPregunta();

},1000);

}else{

document.getElementById(
"audioError"
).play();

mensaje.innerHTML =
"❌ Incorrecto. Intenta otra vez";

mensaje.className =
"incorrecto";

posicionCohete -= 30;

if(posicionCohete < 0){
posicionCohete = 0;
}

cohete.style.left =
posicionCohete + "px";

}

}

function reiniciarJuego(){

indice = 0;
posicionCohete = 0;

cohete.style.left = "0px";

mensaje.innerHTML = "";

cargarPregunta();

}

function irSiguiente(){

window.location.href =
"juego2.html";

}

</script>
