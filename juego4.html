<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 4 - Atrapa el número</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#42a5f5,#1e88e5);
min-height:100vh;
}

.barra-superior{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.usuario{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.usuario img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid orange;
}

.puntaje{
font-size:28px;
font-weight:bold;
color:#ff9800;
}

.contenedor{
text-align:center;
padding:20px;
}

h1{
color:white;
font-size:40px;
margin-bottom:10px;
text-shadow:2px 2px 5px black;
}

.instruccion{
color:white;
font-size:20px;
margin-bottom:20px;
}

.pregunta{
font-size:35px;
color:white;
margin:20px;
}

.opciones{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.opcion{
width:120px;
height:120px;
background:#ffeb3b;
border-radius:20px;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
box-shadow:0 4px 10px rgba(0,0,0,.3);
transition:.2s;
}

.opcion:hover{
transform:scale(1.1);
}

.correcto{
color:#00ff66;
font-size:28px;
margin-top:15px;
font-weight:bold;
}

.incorrecto{
color:red;
font-size:28px;
margin-top:15px;
font-weight:bold;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin:10px;
}

button:hover{
transform:scale(1.05);
}

#btnSiguiente:disabled{
background:gray;
}

</style>
</head>
<body>

<header class="barra-superior">

<div class="usuario">
<img id="avatarUsuario" src="img/avatar.png">
<span id="nombreUsuario">Estudiante</span>
</div>

<div class="puntaje">
⭐ <span id="puntos">0</span>
</div>

</header>

<div class="contenedor">

<h1>🎯 Atrapa el número correcto</h1>

<p class="instruccion">
Haz clic en el resultado correcto lo más rápido posible.
</p>

<div class="pregunta">
<h2 id="pregunta">Cargando...</h2>
</div>

<div class="opciones" id="opciones"></div>

<div id="mensaje"></div>

<button onclick="reiniciarJuego()">🔄 Reiniciar</button>

<button id="btnSiguiente" disabled onclick="irSiguiente()">
➡️ Siguiente Nivel
</button>

<a href="todos.html">
<button>🏠 Inicio</button>
</a>

</div>

<audio id="audioCorrecto" src="audio/correcto.mp3"></audio>
<audio id="audioError" src="audio/error.mp3"></audio>
<audio id="audioFelicitacion" src="audio/felicitaciones.mp3"></audio>

<script>

let preguntas = [
{txt:"6 + 4", res:10},
{txt:"8 + 3", res:11},
{txt:"9 - 2", res:7},
{txt:"5 × 2", res:10},
{txt:"12 ÷ 3", res:4}
];

let indice = 0;
let puntaje = parseInt(localStorage.getItem("puntaje")) || 0;

document.getElementById("puntos").textContent = puntaje;

window.onload = () => {

let nombre = localStorage.getItem("nombre") || "Estudiante";
let avatar = localStorage.getItem("avatar") || "img/avatar.png";

document.getElementById("nombreUsuario").textContent = nombre;
document.getElementById("avatarUsuario").src = avatar;

cargarPregunta();

};

function cargarPregunta(){

if(indice >= preguntas.length){

document.getElementById("pregunta").innerHTML =
"🏆 ¡Juego completado!";

document.getElementById("mensaje").innerHTML =
"¡Excelente trabajo!";

confetti({
particleCount:300,
spread:120
});

document.getElementById("audioFelicitacion").play();

document.getElementById("btnSiguiente").disabled = false;

return;
}

let p = preguntas[indice];

document.getElementById("pregunta").innerHTML = p.txt;

let opciones = [p.res];

while(opciones.length < 3){
let fake = p.res + Math.floor(Math.random()*10)-5;
if(!opciones.includes(fake) && fake >= 0){
opciones.push(fake);
}
}

opciones.sort(()=>Math.random()-0.5);

let cont = document.getElementById("opciones");
cont.innerHTML = "";

opciones.forEach(num=>{

let div = document.createElement("div");
div.className = "opcion";
div.innerText = num;

div.onclick = () => validar(num);

cont.appendChild(div);

});

}

function validar(num){

if(num === preguntas[indice].res){

document.getElementById("audioCorrecto").play();

puntaje += 10;
localStorage.setItem("puntaje",puntaje);
document.getElementById("puntos").textContent = puntaje;

document.getElementById("mensaje").innerHTML =
"🎉 ¡Correcto!";

confetti({
particleCount:120,
spread:80
});

indice++;
setTimeout(()=>{
cargarPregunta();
document.getElementById("mensaje").innerHTML = "";
},1000);

}else{

document.getElementById("audioError").play();

document.getElementById("mensaje").innerHTML =
"❌ Incorrecto, intenta otra vez";

}

}

function reiniciarJuego(){

indice = 0;
cargarPregunta();
document.getElementById("mensaje").innerHTML = "";
document.getElementById("btnSiguiente").disabled = true;

}

function irSiguiente(){
window.location.href = "juego5.html";
}

</script>

</body>
</html>
