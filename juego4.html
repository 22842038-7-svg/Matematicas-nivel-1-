<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 3 - Aventura de Divisiones</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#ffb74d,#ff9800);
min-height:100vh;
}

.barra-superior{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 30px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.usuario{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
font-size:18px;
}

.usuario img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid orange;
}

.puntaje{
font-size:28px;
font-weight:bold;
color:#ff9800;
}

.contenedor-juego{
text-align:center;
padding:30px;
}

h1{
color:white;
font-size:40px;
margin-bottom:15px;
text-shadow:2px 2px 5px black;
}

.instruccion{
font-size:20px;
color:white;
margin-bottom:20px;
}

.escenario{
width:700px;
max-width:95%;
height:120px;
margin:auto;
background:white;
border-radius:20px;
position:relative;
overflow:hidden;
margin-bottom:30px;
}

#mono{
font-size:70px;
position:absolute;
left:0;
top:20px;
transition:.3s;
}

.meta{
position:absolute;
right:20px;
top:20px;
font-size:60px;
}

.pregunta{
margin:20px;
font-size:28px;
color:white;
}

.opciones{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.respuesta{
width:120px;
height:120px;
background:#ffeb3b;
border-radius:20px;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
cursor:grab;
box-shadow:0 4px 10px rgba(0,0,0,.3);
transition:.3s;
}

.respuesta:hover{
transform:scale(1.1);
}

#zonaRespuesta{
width:250px;
height:120px;
background:white;
border:4px dashed #4caf50;
border-radius:20px;
margin:30px auto;
display:flex;
justify-content:center;
align-items:center;
font-size:25px;
font-weight:bold;
}

.correcto{
font-size:28px;
color:#00ff66;
font-weight:bold;
margin-top:20px;
}

.incorrecto{
font-size:28px;
color:red;
font-weight:bold;
margin-top:20px;
}

.botones{
margin-top:30px;
display:flex;
justify-content:center;
gap:15px;
flex-wrap:wrap;
}

button{
padding:15px 25px;
font-size:18px;
border:none;
border-radius:15px;
cursor:pointer;
background:#4caf50;
color:white;
font-weight:bold;
}

button:hover{
transform:scale(1.05);
}

#btnSiguiente:disabled{
background:gray;
cursor:not-allowed;
}

</style>
</head>
<body>

<header class="barra-superior">

<div class="usuario">
<img id="avatarUsuario" src="img/avatar.png">
<span id="nombreUsuario">Estudiante</span>
</div>

<div class="puntaje">
⭐ <span id="puntos">0</span>
</div>

</header>

<div class="contenedor-juego">

<h1>🐵 Aventura de Divisiones</h1>

<p class="instruccion">
Arrastra la respuesta correcta para ayudar al mono a conseguir las bananas.
</p>

<div class="escenario">

<div id="mono">🐵</div>

<div class="meta">🍌</div>

</div>

<div class="pregunta">
<h2>Cargando división...</h2>
</div>

<div class="opciones">
<div class="respuesta" draggable="true"></div>
<div class="respuesta" draggable="true"></div>
<div class="respuesta" draggable="true"></div>
</div>

<div id="zonaRespuesta">
Suelta aquí
</div>

<div id="mensaje"></div>

<div class="botones">

<button onclick="reiniciarJuego()">
🔄 Reiniciar
</button>

<button id="btnSiguiente" disabled onclick="irSiguiente()">
➡️ Siguiente Nivel
</button>

<a href="todos.html">
<button type="button">
🏠 Inicio
</button>
</a>

</div>

</div>

<audio id="audioCorrecto" src="audio/correcto.mp3"></audio>
<audio id="audioError" src="audio/error.mp3"></audio>
<audio id="audioNumero" src="audio/numero.mp3"></audio>
<audio id="audioFelicitacion" src="audio/felicitaciones.mp3"></audio>

<script>

const preguntas = [
{a:12,b:3},
{a:16,b:4},
{a:20,b:5},
{a:18,b:3},
{a:24,b:4}
];

let indice = 0;
let correcta = 0;
let posicionMono = 0;
let juegoTerminado = false;

const zona = document.getElementById("zonaRespuesta");
const mensaje = document.getElementById("mensaje");
const mono = document.getElementById("mono");
const puntosHTML = document.getElementById("puntos");

let puntaje =
parseInt(localStorage.getItem("puntaje")) || 0;

puntosHTML.textContent = puntaje;

window.onload = () => {

let nombre =
localStorage.getItem("nombre") || "Estudiante";

let avatar =
localStorage.getItem("avatar") || "img/avatar.png";

document.getElementById("nombreUsuario").textContent = nombre;
document.getElementById("avatarUsuario").src = avatar;

document.querySelectorAll(".respuesta").forEach(item=>{

item.addEventListener("click",()=>{

let audio =
document.getElementById("audioNumero");

audio.currentTime = 0;
audio.play();

});

item.addEventListener("dragstart",dragStart);

});

cargarPregunta();

};

function cargarPregunta(){

if(juegoTerminado) return;

let p = preguntas[indice];

correcta = p.a / p.b;

document.querySelector(".pregunta h2").innerHTML =
`${p.a} ÷ ${p.b} = ?`;

let respuestas = [correcta];

while(respuestas.length < 3){

let falsa =
correcta + Math.floor(Math.random()*5)-2;

if(
falsa > 0 &&
!respuestas.includes(falsa)
){
respuestas.push(falsa);
}

}

respuestas.sort(()=>Math.random()-0.5);

document.querySelectorAll(".respuesta")
.forEach((caja,i)=>{

caja.innerHTML = respuestas[i];
caja.dataset.valor = respuestas[i];

});

}

function dragStart(e){

e.dataTransfer.setData(
"text",
e.target.dataset.valor
);

}

zona.addEventListener("dragover",e=>{
e.preventDefault();
});

zona.addEventListener("drop",e=>{

e.preventDefault();

let valor =
e.dataTransfer.getData("text");

validar(valor);

});

function validar(valor){

if(juegoTerminado) return;

if(parseInt(valor)===correcta){

document.getElementById("audioCorrecto").play();

mensaje.innerHTML =
"🎉 ¡Correcto!";

mensaje.className =
"correcto";

puntaje += 10;

localStorage.setItem(
"puntaje",
puntaje
);

puntosHTML.textContent =
puntaje;

posicionMono += 140;

mono.style.left =
posicionMono + "px";

confetti({
particleCount:120,
spread:90
});

if(posicionMono >= 650){

juegoTerminado = true;

mensaje.innerHTML =
"🏆 ¡FELICITACIONES! El mono consiguió todas las bananas 🍌🐵";

mensaje.className =
"correcto";

confetti({
particleCount:300,
spread:120
});

document.getElementById(
"audioFelicitacion"
).play();

document.getElementById(
"btnSiguiente"
).disabled = false;

return;

}

indice++;

setTimeout(()=>{

mensaje.innerHTML = "";

cargarPregunta();

},1000);

}else{

document.getElementById(
"audioError"
).play();

mensaje.innerHTML =
"❌ Incorrecto. Intenta nuevamente";

mensaje.className =
"incorrecto";

}

}

function reiniciarJuego(){

juegoTerminado = false;
indice = 0;
correcta = 0;
posicionMono = 0;

mono.style.left = "0px";

mensaje.innerHTML = "";

document.getElementById(
"btnSiguiente"
).disabled = true;

cargarPregunta();

}

function irSiguiente(){

window.location.href =
"juego4.html";

}

</script>

</body>
</html>
