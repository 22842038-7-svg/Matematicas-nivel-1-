<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Juego 4 - Atrapa el número</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-image:url("img/fondo.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
background-attachment:fixed;
min-height:100vh;
}
.barra-superior{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:white;
box-shadow:0 2px 10px rgba(0,0,0,.2);
}

.usuario{
display:flex;
align-items:center;
gap:10px;
font-weight:bold;
}

.usuario img{
width:60px;
height:60px;
border-radius:50%;
border:3px solid orange;
}

.puntaje{
font-size:28px;
font-weight:bold;
color:#ff9800;
}

.contenedor{
    background:rgba(255,255,255,0.9);
    backdrop-filter:blur(5px);
    width:700px;
    max-width:100%;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.25);
}


h1{
color:#ff9800;
font-size:40px;
margin-bottom:10px;
text-shadow:2px 2px 5px black;
}

.instruccion{
color:#1565c0;
font-size:20px;
margin-bottom:20px;
font-weight:bold;
text-shadow:1px 1px 2px white;
}

.pregunta{
font-size:40px;
color:#d84315;
margin:25px;
font-weight:bold;
}

#pregunta{
color:#e65100;
font-size:42px;
font-weight:bold;
text-shadow:1px 1px 3px rgba(0,0,0,.2);
}

.barra-superior{
display:flex;
justify-content:space-between;
align-items:center;
padding:15px 25px;
background:rgba(255,255,255,0.95);
box-shadow:0 2px 10px rgba(0,0,0,.2);
border-radius:15px;
}
.opciones{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.opcion{
width:130px;
height:130px;
background:#ffeb3b;
border-radius:25px;
display:flex;
align-items:center;
justify-content:center;
font-size:42px;
font-weight:bold;
cursor:pointer;
box-shadow:0 6px 15px rgba(0,0,0,.4);
transition:.2s;
position:relative;
}

.opcion:hover{
transform:scale(1.08);
background:#fff176;
}

.correctoAnim{
animation:pop 0.5s ease;
background:#00e676 !important;
color:white;
}

@keyframes pop{
0%{transform:scale(0.8);}
50%{transform:scale(1.3);}
100%{transform:scale(1);}
}

.incorrectoAnim{
animation:shake 0.4s;
background:#ff1744 !important;
color:white;
}

@keyframes shake{
0%{transform:translateX(0);}
25%{transform:translateX(-8px);}
50%{transform:translateX(8px);}
75%{transform:translateX(-8px);}
100%{transform:translateX(0);}
}

#mensaje{
font-size:35px;
font-weight:bold;
margin-top:20px;
}

.correctoText{
color:#00ff99;
text-shadow:0 0 10px #00ff99;
}

.incorrectoText{
color:#ff5252;
}

button{
padding:12px 20px;
border:none;
border-radius:12px;
background:#4caf50;
color:white;
font-size:16px;
font-weight:bold;
cursor:pointer;
margin:10px;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

#btnSiguiente:disabled{
background:gray;
}

</style>
</head>
<body>

<header class="barra-superior">

<div class="usuario">
<img id="avatarUsuario" src="img/avatar.png">
<span id="nombreUsuario">Estudiante</span>
</div>

<div class="puntaje">
⭐ <span id="puntos">0</span>
</div>

</header>

<div class="contenedor">

<h1>🎯 Atrapa el número correcto</h1>

<p class="instruccion">
Haz clic en la respuesta correcta.
</p>

<div class="pregunta">
<h2 id="pregunta">Cargando...</h2>
</div>

<div class="opciones" id="opciones"></div>

<div id="mensaje"></div>

<button onclick="reiniciarJuego()">🔄 Reiniciar</button>

<button id="btnSiguiente" disabled onclick="irSiguiente()">➡️ Siguiente Nivel</button>

<a href="todoslosjuegos.html"><button>🏠 Inicio</button></a>

</div>

<audio id="audioCorrecto" src="audio/correcto.mp3"></audio>
<audio id="audioError" src="audio/error.mp3"></audio>
<audio id="audioFelicitacion" src="audio/felicitaciones.mp3"></audio>

<script>

let preguntas = [
{txt:"6 + 4", res:10},
{txt:"8 + 3", res:11},
{txt:"9 - 2", res:7},
{txt:"5 × 2", res:10},
{txt:"12 ÷ 3", res:4}
];

let indice = 0;
let puntaje = parseInt(localStorage.getItem("puntaje")) || 0;

document.getElementById("puntos").textContent = puntaje;

window.onload = () => {

let nombre = localStorage.getItem("nombre") || "Estudiante";
let avatar = localStorage.getItem("avatar") || "img/avatar.png";

document.getElementById("nombreUsuario").textContent = nombre;
document.getElementById("avatarUsuario").src = avatar;

cargarPregunta();

};

function cargarPregunta(){

if(indice >= preguntas.length){

document.getElementById("pregunta").innerHTML =
"🏆 ¡Juego completado!";

document.getElementById("mensaje").innerHTML =
"🎉 ¡EXCELENTE TRABAJO!";

confetti({
particleCount:350,
spread:120
});

document.getElementById("audioFelicitacion").play();

document.getElementById("btnSiguiente").disabled = false;

return;
}

let p = preguntas[indice];

document.getElementById("pregunta").innerHTML = p.txt;

let opciones = [p.res];

while(opciones.length < 3){
let fake = p.res + Math.floor(Math.random()*10)-5;
if(!opciones.includes(fake) && fake >= 0){
opciones.push(fake);
}
}

opciones.sort(()=>Math.random()-0.5);

let cont = document.getElementById("opciones");
cont.innerHTML = "";

opciones.forEach(num=>{

let div = document.createElement("div");
div.className = "opcion";
div.innerText = num;

div.onclick = () => validar(div, num);

cont.appendChild(div);

});

}

function validar(div, num){

if(num === preguntas[indice].res){

div.classList.add("correctoAnim");

document.getElementById("audioCorrecto").play();

document.getElementById("mensaje").innerHTML =
"🎉 ¡CORRECTO!";

document.getElementById("mensaje").className =
"correctoText";

confetti({
particleCount:150,
spread:90
});

puntaje += 10;
localStorage.setItem("puntaje",puntaje);
document.getElementById("puntos").textContent = puntaje;

indice++;

setTimeout(()=>{
cargarPregunta();
document.getElementById("mensaje").innerHTML = "";
},900);

}else{

div.classList.add("incorrectoAnim");

document.getElementById("audioError").play();

document.getElementById("mensaje").innerHTML =
"❌ Intenta otra vez";

document.getElementById("mensaje").className =
"incorrectoText";

setTimeout(()=>{
div.classList.remove("incorrectoAnim");
},500);

}

}

function reiniciarJuego(){

indice = 0;
cargarPregunta();
document.getElementById("mensaje").innerHTML = "";
document.getElementById("btnSiguiente").disabled = true;

}

function irSiguiente(){
window.location.href = "juego5.html";
}

</script>

</body>
</html>
