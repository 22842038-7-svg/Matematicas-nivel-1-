<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Juego 6 - Encuentra el Tesoro</title>

<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background-image:url("img/fondo.jpeg");
background-size:cover;
background-position:center;
background-repeat:no-repeat;
min-height:100vh;
text-align:center;
overflow:hidden;
}

h1{
margin-top:20px;
font-size:45px;
color:white;
text-shadow:2px 2px 5px black;
}

.info{
display:flex;
justify-content:center;
gap:40px;
margin:20px;
font-size:28px;
font-weight:bold;
color:white;
}

#pregunta{
font-size:40px;
color:white;
margin:20px;
text-shadow:2px 2px 5px black;
}

#tablero{
width:90%;
max-width:900px;
margin:auto;
display:grid;
grid-template-columns:repeat(4,1fr);
gap:20px;
padding:20px;
}

.moneda{
width:120px;
height:120px;
margin:auto;
border-radius:50%;
background:gold;
display:flex;
justify-content:center;
align-items:center;
font-size:40px;
font-weight:bold;
cursor:pointer;
box-shadow:0 0 15px black;
transition:.3s;
}

.moneda:hover{
transform:scale(1.1);
}

#mensaje{
font-size:30px;
font-weight:bold;
margin-top:20px;
color:white;
text-shadow:2px 2px 5px black;
}

@media(max-width:768px){

#tablero{
grid-template-columns:repeat(2,1fr);
}

.moneda{
width:100px;
height:100px;
font-size:30px;
}

}

</style>
</head>

<body>

<h1>🏴‍☠️ Encuentra el Tesoro Correcto</h1>

<div class="info">
<div>⭐ Aciertos: <span id="aciertos">0</span>/5</div>
<div>❤️ Vidas: <span id="vidas">3</span></div>
</div>

<div id="pregunta"></div>

<div id="tablero"></div>

<div id="mensaje"></div>

<audio id="audioCorrecto" src="audio/correcto.mp3"></audio>
<audio id="audioError" src="audio/error.mp3"></audio>
<audio id="audioFelicitacion" src="audio/felicitaciones.mp3"></audio>

<script>

let vidas = 3;
let aciertos = 0;
let respuestaCorrecta = 0;

const tablero =
document.getElementById("tablero");

function nuevaPregunta(){

let a =
Math.floor(Math.random()*10)+1;

let b =
Math.floor(Math.random()*10)+1;

respuestaCorrecta = a + b;

document.getElementById(
"pregunta"
).innerHTML =
`💰 ¿Cuánto es ${a} + ${b}?`;

crearMonedas();

}

function crearMonedas(){

tablero.innerHTML = "";

let numeros = [respuestaCorrecta];

while(numeros.length < 8){

let falso =
respuestaCorrecta +
Math.floor(Math.random()*10)-5;

if(
falso > 0 &&
!numeros.includes(falso)
){
numeros.push(falso);
}

}

numeros.sort(
()=>Math.random()-0.5
);

numeros.forEach(numero=>{

let moneda =
document.createElement("div");

moneda.className =
"moneda";

moneda.innerHTML =
numero;

moneda.onclick =
()=> validar(numero);

tablero.appendChild(moneda);

});

}

function validar(numero){

if(numero === respuestaCorrecta){

document.getElementById(
"audioCorrecto"
).play();

document.getElementById(
"mensaje"
).innerHTML =
"✅ ¡Correcto!";

aciertos++;

document.getElementById(
"aciertos"
).innerHTML =
aciertos;

if(aciertos >= 5){

ganar();

return;

}

setTimeout(()=>{

document.getElementById(
"mensaje"
).innerHTML="";

nuevaPregunta();

},1000);

}else{

document.getElementById(
"audioError"
).play();

vidas--;

document.getElementById(
"vidas"
).innerHTML =
vidas;

document.getElementById(
"mensaje"
).innerHTML =
"❌ Incorrecto";

if(vidas <= 0){

document.getElementById(
"mensaje"
).innerHTML =
"💀 GAME OVER";

setTimeout(()=>{

location.reload();

},2500);

}

}

}

function ganar(){

document.getElementById(
"audioFelicitacion"
).play();

confetti({
particleCount:300,
spread:180
});

document.getElementById(
"mensaje"
).innerHTML =
"🏆 ¡ENCONTRASTE TODOS LOS TESOROS!";

setTimeout(()=>{

window.location.href =
"final.html";

},3000);

}

nuevaPregunta();

</script>

</body>
</html>
